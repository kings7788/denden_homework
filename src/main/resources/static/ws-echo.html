<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>WebSocket Echo 測試</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; }
    #log { border: 1px solid #ccc; height: 240px; overflow-y: auto; padding: 8px; margin: 12px 0; }
    .me { color: #06c; } .srv { color: #093; } .sys { color: #999; }
  </style>
</head>
<body>
  <h2>WebSocket Echo 測試</h2>
  <div id="log"></div>
  <input id="msg" placeholder="輸入訊息後按 Enter" style="width:75%">
  <button onclick="send()">送出</button>

  <script>
    const log = (text, cls) => {
      const d = document.getElementById('log');
      d.innerHTML += `<div class="${cls}">${text}</div>`;
      d.scrollTop = d.scrollHeight;
    };

    // 1) 建立連線(注意是 ws:// 不是 http://)
    const ws = new WebSocket(`ws://${location.host}/ws/echo`);

    ws.onopen    = () => log('[已連線]', 'sys');
    ws.onmessage = (e) => log('伺服器回: ' + e.data, 'srv');   // 收到 echo
    ws.onclose   = () => log('[連線關閉]', 'sys');
    ws.onerror   = () => log('[發生錯誤]', 'sys');

    function send() {
      const input = document.getElementById('msg');
      if (!input.value) return;
      log('我送出: ' + input.value, 'me');
      ws.send(input.value);   // 2) 送訊息給伺服器
      input.value = '';
    }
    document.getElementById('msg').addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
  </script>
</body>
</html>

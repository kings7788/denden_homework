spring.application.name=denden_homework

# --- H2 in-memory database ---
spring.datasource.url=jdbc:h2:mem:denden;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- H2 web console at http://localhost:8080/h2-console ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Jackson: API uses snake_case JSON (challenge_id, access_token, last_login_at ...) ---
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# --- App base URL (used to build activation links in emails) ---
app.base-url=http://localhost:8080

# --- JWT (override the secret via env var in production) ---
app.jwt.secret=${JWT_SECRET:dev-only-change-me-please-use-a-long-random-64-byte-secret-0123456789}
app.jwt.expiration-ms=3600000

# --- Email provider selector: log | gmail | mailjet ---
# Default "log" only prints the activation link / OTP (no real send).
# Real credentials live in the GIT-IGNORED application-dev.properties; enable with:
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
#
# gmail   -> needs spring.mail.* (smtp.gmail.com:587 + Gmail App Password)
# mailjet -> needs mailjet.api-key / mailjet.secret-key / mailjet.sender-email
app.email.provider=log

# Production profile (e.g. Cloud Run + Neon PostgreSQL).
# All secrets come from environment variables — nothing sensitive is committed.
# Run with: ./mvnw spring-boot:run -Dspring-boot.run.profiles=prod
#   (env: DB_URL, DB_USERNAME, DB_PASSWORD, JWT_SECRET, ...)

# --- PostgreSQL datasource (overrides the H2 defaults in application.properties) ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate (dialect auto-detected from the PostgreSQL driver) ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# --- Disable the H2 console in production ---
spring.h2.console.enabled=false

# --- Swagger / OpenAPI: OFF by default in prod (don't expose the API surface).
#     Set SWAGGER_ENABLED=true to turn it on (e.g. for a live demo). ---
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}

# --- App config from environment ---
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.email.provider=${EMAIL_PROVIDER:log}

# Gmail SMTP (used when EMAIL_PROVIDER=gmail)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.email.from=${MAIL_FROM:${MAIL_USERNAME:}}
